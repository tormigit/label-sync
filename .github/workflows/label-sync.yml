name: Label Sync

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply changes (true) or run dry-run (false)"
        required: true
        default: "false"
      deleteExtra:
        description: "Delete extra labels in targets: config (use label-sync.yml), true, or false (keep manual labels)"
        required: false
        default: "config"
        type: choice
        options:
          - config
          - "true"
          - "false"
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify LABEL_SYNC_TOKEN is set
        env:
          LABEL_SYNC_TOKEN: ${{ secrets.LABEL_SYNC_TOKEN }}
        run: |
          if [ -z "$LABEL_SYNC_TOKEN" ]; then
            echo "::error::Missing required secret LABEL_SYNC_TOKEN. Add it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - run: npm ci

      - name: Sync labels
        env:
          GITHUB_TOKEN: ${{ secrets.LABEL_SYNC_TOKEN }}
        run: |
          APPLY_INPUT="${{ github.event.inputs.apply }}"
          DELETE_EXTRA_INPUT="${{ github.event.inputs.deleteExtra }}"

          if [ -z "$APPLY_INPUT" ]; then
            APPLY_INPUT="false"
          fi

          if [ -z "$DELETE_EXTRA_INPUT" ]; then
            DELETE_EXTRA_INPUT="config"
          fi

          EXTRA_ARGS=""
          if [ "$DELETE_EXTRA_INPUT" = "true" ] || [ "$DELETE_EXTRA_INPUT" = "false" ]; then
            EXTRA_ARGS="--delete-extra $DELETE_EXTRA_INPUT"
          fi

          if [ "$APPLY_INPUT" = "true" ]; then
            npm run sync -- --apply $EXTRA_ARGS
          else
            npm run sync -- --dry-run $EXTRA_ARGS
          fi
