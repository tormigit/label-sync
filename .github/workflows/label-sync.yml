name: Label Sync

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose what to do"
        required: false
        default: "Dry run (preview only)"
        type: choice
        options:
          - "Dry run (preview only)"
          - "Apply (keep changed or added labels)"
          - "Apply (mirror source)"
      targetMode:
        description: "Which repositories to sync"
        required: false
        default: "config"
        type: choice
        options:
          - config
          - discover
      discoverOwner:
        description: "When targetMode=discover: discover repos owned by this user (optional; defaults to source.owner from label-sync.yml)"
        required: false
        default: ""
      includeRepos:
        description: "Optional: only include these repos (comma-separated repo names or owner/repo)"
        required: false
        default: ""
      excludeRepos:
        description: "Optional: exclude these repos (comma-separated repo names or owner/repo)"
        required: false
        default: ""
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify LABEL_SYNC_TOKEN is set
        env:
          LABEL_SYNC_TOKEN: ${{ secrets.LABEL_SYNC_TOKEN }}
        run: |
          if [ -z "$LABEL_SYNC_TOKEN" ]; then
            echo "::error::Missing required secret LABEL_SYNC_TOKEN. Add it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - run: npm ci

      - name: Sync labels
        env:
          GITHUB_TOKEN: ${{ secrets.LABEL_SYNC_TOKEN }}
        run: |
          MODE_INPUT="${{ github.event.inputs.mode }}"
          TARGET_MODE_INPUT="${{ github.event.inputs.targetMode }}"
          DISCOVER_OWNER_INPUT="${{ github.event.inputs.discoverOwner }}"
          INCLUDE_REPOS_INPUT="${{ github.event.inputs.includeRepos }}"
          EXCLUDE_REPOS_INPUT="${{ github.event.inputs.excludeRepos }}"
          EVENT_NAME="${{ github.event_name }}"

          if [ -z "$MODE_INPUT" ]; then
            MODE_INPUT="Dry run (preview only)"
          fi

          if [ -z "$TARGET_MODE_INPUT" ]; then
            if [ "$EVENT_NAME" = "schedule" ]; then
              TARGET_MODE_INPUT="discover"
            else
              TARGET_MODE_INPUT="config"
            fi
          fi

          SYNC_ARGS=()

          if [ "$MODE_INPUT" = "Apply (keep changed or added labels)" ]; then
            SYNC_ARGS+=(--apply)
            SYNC_ARGS+=(--delete-extra false)
          elif [ "$MODE_INPUT" = "Apply (mirror source)" ]; then
            SYNC_ARGS+=(--apply)
            SYNC_ARGS+=(--delete-extra true)
          else
            SYNC_ARGS+=(--dry-run)
          fi

          if [ "$TARGET_MODE_INPUT" = "discover" ]; then
            SYNC_ARGS+=(--target-mode discover)
            if [ -n "$DISCOVER_OWNER_INPUT" ]; then
              SYNC_ARGS+=(--discover-owner "$DISCOVER_OWNER_INPUT")
            fi
          fi

          if [ -n "$INCLUDE_REPOS_INPUT" ]; then
            SYNC_ARGS+=(--include-repos "$INCLUDE_REPOS_INPUT")
          fi

          if [ -n "$EXCLUDE_REPOS_INPUT" ]; then
            SYNC_ARGS+=(--exclude-repos "$EXCLUDE_REPOS_INPUT")
          fi

          npm run build --silent

          TARGETS_ARGS=()
          if [ "$TARGET_MODE_INPUT" = "discover" ]; then
            TARGETS_ARGS+=(--target-mode discover)
            if [ -n "$DISCOVER_OWNER_INPUT" ]; then
              TARGETS_ARGS+=(--discover-owner "$DISCOVER_OWNER_INPUT")
            fi
          fi
          if [ -n "$INCLUDE_REPOS_INPUT" ]; then
            TARGETS_ARGS+=(--include-repos "$INCLUDE_REPOS_INPUT")
          fi
          if [ -n "$EXCLUDE_REPOS_INPUT" ]; then
            TARGETS_ARGS+=(--exclude-repos "$EXCLUDE_REPOS_INPUT")
          fi

          TARGET_LIST=$(node dist/index.js targets "${TARGETS_ARGS[@]}")

          {
            echo "### Target repositories"
            echo
            echo "\`targetMode\`: $TARGET_MODE_INPUT"
            echo
            echo "\`count\`: $(echo "$TARGET_LIST" | sed '/^$/d' | wc -l | tr -d ' ')"
            echo
            echo "```"
            echo "$TARGET_LIST"
            echo "```"
          } >> "$GITHUB_STEP_SUMMARY"

          node dist/index.js sync "${SYNC_ARGS[@]}"
