name: Label Sync

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose what to do: dry-run (preview), apply-keep-extra (keep manual labels in targets), apply-delete-extra (delete labels not in source)"
        required: false
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - apply-keep-extra
          - apply-delete-extra
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify LABEL_SYNC_TOKEN is set
        env:
          LABEL_SYNC_TOKEN: ${{ secrets.LABEL_SYNC_TOKEN }}
        run: |
          if [ -z "$LABEL_SYNC_TOKEN" ]; then
            echo "::error::Missing required secret LABEL_SYNC_TOKEN. Add it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - run: npm ci

      - name: Sync labels
        env:
          GITHUB_TOKEN: ${{ secrets.LABEL_SYNC_TOKEN }}
        run: |
          MODE_INPUT="${{ github.event.inputs.mode }}"

          if [ -z "$MODE_INPUT" ]; then
            MODE_INPUT="dry-run"
          fi

          EXTRA_ARGS=""
          APPLY_MODE="false"
          if [ "$MODE_INPUT" = "apply-keep-extra" ]; then
            APPLY_MODE="true"
            EXTRA_ARGS="--delete-extra false"
          elif [ "$MODE_INPUT" = "apply-delete-extra" ]; then
            APPLY_MODE="true"
            EXTRA_ARGS="--delete-extra true"
          fi

          if [ "$APPLY_MODE" = "true" ]; then
            npm run sync -- --apply $EXTRA_ARGS
          else
            npm run sync -- --dry-run $EXTRA_ARGS
          fi
